# Render.com deployment configuration (free tier)
services:
  - type: web
    name: furever-home-chatbot
    runtime: docker
    plan: free
    dockerfilePath: ./chatbot-api/Dockerfile
    dockerContext: ./chatbot-api
    envVars:
      - key: GROQ_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://the-furever-home.com,http://localhost:5500
      - key: GOOGLE_SHEET_ID
        value: 1Xg4T3vmhoLxN0C2lEBFaN88Y2LSvoF6DQVoCxL3dt80
      - key: KB_SHEET_NAME
        value: pet_care_kb
    healthCheckPath: /health
